<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

body{
    background:linear-gradient(135deg,#0d6efd,#0a58ca);
    font-family:Arial,Helvetica,sans-serif;
}

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    font-size:70px;
}

.btn-primary{
    width:100%;
    border-radius:10px;
}

h1{
    color:#0d6efd;
    font-weight:bold;
}

p{
    color:#666;
}

    </style>

</head>

<body>

<div class="container hero">

<div class="card p-5 text-center" style="max-width:500px; width:100%;">

<div class="logo">
🎓
</div>

<h1>EduControl</h1>

<p>
Sistema de Gestión Académica
</p>

<hr>

<form action="/dashboard">

<div class="mb-3">

<input
type="text"
class="form-control"
placeholder="Usuario"
required>

</div>

<div class="mb-4">

<input
type="password"
class="form-control"
placeholder="Contraseña"
required>

</div>

<button class="btn btn-primary">

Ingresar

</button>

</form>

<br>

<div class="row">

<div class="col">

<div class="card p-3">

<h4>120</h4>

<small>Estudiantes</small>

</div>

</div>

<div class="col">

<div class="card p-3">

<h4>15</h4>

<small>Profesores</small>

</div>

</div>

</div>

<br>

<div class="row">

<div class="col">

<div class="card p-3">

<h4>8</h4>

<small>Cursos</small>

</div>

</div>

<div class="col">

<div class="card p-3">

<h4>95%</h4>

<small>Asistencia</small>

</div>

</div>

</div>

<hr>

<p>

EduControl permite administrar estudiantes, docentes, cursos, asistencia y calificaciones desde una única plataforma.

</p>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
