<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EduControl</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef2f7;
}

header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.login{
width:350px;
background:white;
margin:60px auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,.2);
}

.login h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
font-size:16px;
}

button:hover{
background:#084db8;
}

#panel{
display:none;
}

.menu{
background:#0d6efd;
width:220px;
height:100vh;
position:fixed;
color:white;
padding-top:20px;
}

.menu h2{
text-align:center;
margin-bottom:30px;
}

.menu ul{
list-style:none;
}

.menu ul li{
padding:15px;
cursor:pointer;
}

.menu ul li:hover{
background:#084db8;
}

.contenido{
margin-left:230px;
padding:30px;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
width:220px;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,.15);
text-align:center;
}

.card h3{
color:#0d6efd;
}

.formulario{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,.15);
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

table th{
background:#0d6efd;
color:white;
padding:10px;
}

table td{
padding:10px;
text-align:center;
border:1px solid #ddd;
}

.eliminar{
background:red;
padding:6px 10px;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<header>

EduControl

</header>

<div class="login" id="login">

<h2>Iniciar Sesión</h2>

<input type="text" id="usuario" placeholder="Usuario">

<input type="password" id="clave" placeholder="Contraseña">

<button onclick="ingresar()">

Ingresar

</button>

</div>

<div id="panel">

<div class="menu">

<h2>EduControl</h2>

<ul>

<li>🏠 Inicio</li>

<li>👨‍🎓 Estudiantes</li>

<li>📚 Cursos</li>

<li>👨‍🏫 Profesores</li>

<li>📝 Notas</li>

<li onclick="salir()">🚪 Cerrar sesión</li>

</ul>

</div>

<div class="contenido">

<h1>Dashboard</h1>

<br>

<div class="cards">

<div class="card">

<h3 id="cantidad">0</h3>

<p>Estudiantes</p>

</div>

<div class="card">

<h3>8</h3>

<p>Cursos</p>

</div>

<div class="card">

<h3>15</h3>

<p>Profesores</p>

</div>

<div class="card">

<h3>95%</h3>

<p>Asistencia</p>

</div>

</div>

<div class="formulario">

<h2>Registrar Estudiante</h2>

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="apellido" placeholder="Apellido">

<input type="email" id="correo" placeholder="Correo">

<button onclick="guardar()">

Guardar Estudiante

</button>

<table>

<thead>

<tr>

<th>Nombre</th>

<th>Apellido</th>

<th>Correo</th>

<th>Acción</th>

</tr>

</thead>

<tbody id="tabla">

</tbody>

</table>

</div>

</div>

</div>

<script>

let estudiantes=[];

function ingresar(){

let u=document.getElementById("usuario").value;

let c=document.getElementById("clave").value;

if(u=="admin" && c=="1234"){

document.getElementById("login").style.display="none";

document.getElementById("panel").style.display="block";

}else{

alert("Usuario o contraseña incorrectos");

}

}

function salir(){

location.reload();

}

function guardar(){

let nombre=document.getElementById("nombre").value;

let apellido=document.getElementById("apellido").value;

let correo=document.getElementById("correo").value;

if(nombre==""||apellido==""||correo==""){

alert("Complete todos los campos");

return;

}

estudiantes.push({

nombre,

apellido,

correo

});

mostrar();

document.getElementById("nombre").value="";

document.getElementById("apellido").value="";

document.getElementById("correo").value="";

}

function mostrar(){let tabla = document.getElementById("tabla");

tabla.innerHTML = "";

estudiantes.forEach((estudiante, index) => {

tabla.innerHTML += `
<tr>

<td>${estudiante.nombre}</td>

<td>${estudiante.apellido}</td>

<td>${estudiante.correo}</td>

<td>

<button class="eliminar" onclick="eliminar(${index})">

Eliminar

</button>

</td>

</tr>
`;

});

document.getElementById("cantidad").innerHTML = estudiantes.length;

}

function eliminar(indice){

if(confirm("¿Desea eliminar este estudiante?")){

estudiantes.splice(indice,1);

mostrar();

}

}

</script>

</body>

</html>
